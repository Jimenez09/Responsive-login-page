<!DOCTYPE html>
<html lang="pt-br">
<head>
	<title>Fórmula 1</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="/src/img/ficon.png" type="image/x-icon">
  <link rel="stylesheet" type="text/css" href="/src/css/f1_style.css">
  <link rel="stylesheet" href="/src/css/reset.css">
  <script src="/src/js/f1_script.js" defer type="module"></script>
  <script src="/src/js/cadastro.js" defer type="module"></script>
  <script src="/src/js/index.js" defer type="module"></script>
</head>

<body>
  <div class="cont">
    <div class="form sign-in">
      <h2>Sign In</h2>
      <label>
        <input type="email"  id="username" class="form-control color">
        <span class="color">Endereço de Email</span>
      </label>
      <label>
        <input type="password" id="password" class="form-control color">
        <span class="color">Senha de acesso</span>
      </label>
      <button class="submit" type="button">Entrar</button>

      <div class="social-media">
        <ul>
          <li>
              <a href="">
                <img src="/src/img/Rede_Sociais/facebook.png" alt="facebook">
              </a>
            </li>
          <li>
              <a href="">
                <img src="/src/img/Rede_Sociais/twitter.png" alt="twitter">
              </a>
          </li>
          <li>
              <a href="">
                <img src="/src/img/Rede_Sociais/linkedin.png" alt="linkedin">
              </a>
          </li>
          <li>
              <a href="">
                <img src="/src/img/Rede_Sociais/instagram.png" alt="instagram">
              </a>
          </li>
        </ul>
      </div>
    </div>

    <div class="sub-cont">
      <div class="img">
        <div class="img-text m-up">
          <h2>Não tem uma conta?</h2>
          <p>Click no botão abaixo e faça a sua!</p>
          <div class="footer">
            <img src="/src/img/Kauany_01.png" alt="Arte de Kauany">
          </div>
        </div>
        <div class="img-text m-in">
          <h2>Já tem uma conta?</h2>
          <p>Volte e faça login!</p>
          <div class="footer">
            <img src="/src/img/Kauany_01.png" alt="Arte de Kauany">
          </div>
        </div>
        <div class="img-btn">
          <span class="m-up">Sign Up</span>
          <span class="m-in">Sing In</span>
        </div>
      </div>
      <form action="" id="form-registro">
        <div class="form sign-up">
          <h2>Sign Up</h2>
          <!-- <label>
            <span class="color">Nome</span>
            <input type="text" id="name" class="color">
          </label> -->
          <label class="text-light" for="username">
            <input type="username" id="email" class="color">
            <span class="color">Email</span>
          </label>
          <label class="text-light" for="password">
            <input type="password" id="senha" class="color">
            <span class="color">Senha</span>
          </label>
          <label class="text-light" for="password-repeat">
            <input type="password" id="password-repeat" class="color">
            <span class="color">Confirmar senha</span>
          </label>
          <button type="button" id="cadastro" class="submit">Cadastrar</button>
        </div>
      </form>
    </div>
  </div>
<!-- <script type="text/javascript" src="/js/f1_script.js"></script> -->
</body>
</html>
